<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>clarity - Find Your Focus</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/premium-enhanced.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      background: var(--card);
      padding: 48px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 90%;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .login-header p {
      color: var(--muted);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--soft);
      border-radius: 8px;
      font-size: 16px;
    }
    .form-group input:focus {
      border-color: var(--primary);
      outline: none;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .login-btn:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }
    .login-note {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Logging in...</p>
    </div>
  </div>

  <div class="login-container">
    <div class="login-header">
      <img src="logo.png" alt="Clarity Logo" class="app-logo" style="width: 200px; height: 150px; margin-bottom: 20px; border-radius: 16px;">
      <h1 class="app-title">CLARITY</h1>
      <p class="subtitle">Your executive function companion</p>
    </div>

    <form id="loginForm" onsubmit="submitLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Minimum 6 characters" minlength="6" autocomplete="current-password">
      </div>

      <button type="submit" class="login-btn">Login / Register</button>
    </form>

    <p class="login-note">
      New here? Just enter any email and password to create an account!
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function submitLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      handleLogin(email, password);
    }

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
