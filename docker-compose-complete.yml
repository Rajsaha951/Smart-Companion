

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: smart-companion-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smart-companion
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - smart-companion-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # LLM API Service (Python/FastAPI)
  llm-api:
    build:
      context: ./llm_api
      dockerfile: Dockerfile
    container_name: smart-companion-llm-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - smart-companion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Backend Service (Node.js/Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-companion-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/smart-companion
      - JWT_SECRET=${JWT_SECRET}
      - AI_BASE_URL=http://llm-api:8000
    depends_on:
      mongodb:
        condition: service_healthy
      llm-api:
        condition: service_healthy
    networks:
      - smart-companion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Frontend Service (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=/api
    container_name: smart-companion-frontend
    restart: unless-stopped
    ports:
      - "5500:80"
    depends_on:
      - backend
    networks:
      - smart-companion-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  smart-companion-network:
    driver: bridge
    name: smart-companion-network

volumes:
  mongodb_data:
    driver: local
    name: smart-companion-mongodb-data
  mongodb_config:
    driver: local
    name: smart-companion-mongodb-config